<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff4fa3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>El videojuego de Cami</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/base.css?v=2">
  <link rel="stylesheet" href="css/games.css?v=2">
</head>
<body>
  <div id="viewport">
    <div id="stage">
      <div id="scene"></div>
      <div id="hud"></div>
      <canvas id="fx" width="1600" height="900"></canvas>
      <div id="overlay"></div>
    </div>
  </div>

  <div id="rotate-overlay" hidden>
    <div class="rotate-card">
      <div class="rotate-phone">📱</div>
      <div class="rotate-text">¡Gira tu teléfono!</div>
      <div class="rotate-sub">Cami juega de lado 💖</div>
    </div>
  </div>

  <!-- motor (orden de dependencias) -->
  <script src="js/storage.js?v=2"></script>
  <script src="js/audio.js?v=2"></script>
  <script src="js/tts.js?v=2"></script>
  <script src="js/stage.js?v=2"></script>
  <script src="js/confetti.js?v=2"></script>
  <script src="js/drag.js?v=2"></script>
  <script src="js/characters.js?v=2"></script>
  <script src="js/shell.js?v=2"></script>
  <!-- juegos -->
  <script src="js/games/burbujas.js?v=2"></script>
  <script src="js/games/animales.js?v=2"></script>
  <script src="js/games/cucu.js?v=2"></script>
  <script src="js/games/figuras.js?v=2"></script>
  <script src="js/games/colores.js?v=2"></script>
  <script src="js/games/tamanos.js?v=2"></script>
  <script src="js/games/numeros.js?v=2"></script>
  <script src="js/games/rompecabezas.js?v=2"></script>
  <!-- arranque -->
  <script src="js/home.js?v=2"></script>
  <script src="js/main.js?v=2"></script>
</body>
</html>
